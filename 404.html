<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Ben Velkovski</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">

    <!-- Apply the saved theme before first paint to avoid a flash of the wrong theme -->
    <script>
        (function () {
            var theme = null;
            try { theme = localStorage.getItem("theme"); } catch (e) {}
            if (!theme && window.matchMedia("(prefers-color-scheme: light)").matches) theme = "light";
            if (theme) document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>

    <link rel="stylesheet" href="/css/normalize.css">
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/main.js" defer></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <style>
        /* Error pages are served at whatever URL failed, so everything here
           is root-absolute and self-contained on top of the site tokens. */
        .err {
            flex: 1;
            min-height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.75rem;
            text-align: center;
        }

        .err-kicker {
            margin: 0;
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: .35em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .err-num {
            margin: 0;
            font-size: clamp(5rem, 18vw, 9rem);
            font-weight: 500;
            line-height: 1;
            display: flex;
            align-items: center;
            gap: .05em;
        }

        /* the site mascot stands in for the zero: a literal bug in the 404 */
        .err-num img {
            width: .8em;
            image-rendering: pixelated;
            transition: filter .3s ease;
            filter: invert(1) hue-rotate(180deg);
        }
        [data-theme="light"] .err-num img { filter: none; }

        .err-quote {
            margin: 0;
            max-width: min(30ch, 100%);
            font-size: clamp(1.4rem, 4vw, 2rem);
            line-height: 1.45;
            color: var(--text-desc);
        }
        .err-quote strong {
            display: block;
            margin-top: .3em;
            font-weight: 600;
            color: var(--text);
        }

        .err-quote-source {
            margin: 0;
            font-size: .95rem;
            font-weight: 500;
            letter-spacing: .25em;
            text-transform: uppercase;
            color: var(--sakura-text);
        }

        .err-aside {
            margin: .5rem 0 0 0;
            font-size: 1.15rem;
            color: var(--text-muted);
        }

        .err .btn { width: auto; }
    </style>
</head>

<body>
    <a class="skip-link" href="#main">Skip to content</a>
    <nav>
        <a href="/index.html">Ben Velkovski</a>
        <a href="/index.html#about">About</a>
        <a href="/index.html#skills">Skills</a>
        <a href="/index.html#projects">Work</a>
        <a href="/index.html#contact">Contact</a>
        <button id="theme-toggle" aria-label="Light theme" aria-pressed="false">
            <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
    </nav>
    <main id="main">
        <section class="err">
            <p class="err-kicker">Page not found</p>
            <h1 class="err-num" aria-label="404">
                <span aria-hidden="true">4</span><img src="/assets/bug.gif" alt=""><span aria-hidden="true">4</span>
            </h1>
            <blockquote class="err-quote">
                <p>“The impediment to action advances action. <strong>What stands in the way becomes the way.”</strong></p>
            </blockquote>
            <p class="err-quote-source">Marcus Aurelius — Meditations</p>
            <p class="err-aside">This page doesn’t exist. The site does.</p>
            <a href="/index.html" class="btn primary">Back Home</a>
        </section>
    </main>
    <footer>
        <p>© 2026 Ben Velkovski</p>
        <p>El Psy Kongroo.</p>
    </footer>
</body>
</html>
